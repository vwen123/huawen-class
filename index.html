<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智学华文小达人 Smart Chinese Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#1A1A2E,#0A0A18);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:400px;width:100%;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-size:60px;margin-bottom:10px;filter:drop-shadow(0 0 16px rgba(255,215,0,.4))}
h1{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;color:#FFD700;margin-bottom:5px;letter-spacing:.04em}
.slogan{font-size:11px;color:rgba(255,215,0,.55);font-weight:700;letter-spacing:.12em;margin-bottom:36px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px 24px;margin-bottom:14px;cursor:pointer;text-decoration:none;display:block;transition:all .2s;width:100%}
.card:hover{background:rgba(255,255,255,.1);transform:translateY(-3px)}
.card-icon{font-size:36px;margin-bottom:10px}
.card-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:white;margin-bottom:4px}
.card-sub{font-size:12px;color:rgba(255,255,255,.45)}
.student{border-color:rgba(212,160,23,.3)}
.student:hover{border-color:#FFD700;box-shadow:0 0 20px rgba(255,215,0,.2)}
.teacher{border-color:rgba(192,57,43,.3)}
.teacher:hover{border-color:#C0392B;box-shadow:0 0 20px rgba(192,57,43,.2)}
.footer{font-size:10px;color:rgba(255,255,255,.18);padding:18px 0 10px;text-align:center;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🏮</div>
  <h1>智学华文小达人</h1>
  <p style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:2px">Smart Chinese Master</p>
  <p class="slogan">智能引领，玩转华文</p>
  <a class="card student" href="student.html">
    <div class="card-icon">📚</div>
    <div class="card-title">学生入口</div>
    <div class="card-sub">输入进入码，开始今天的华文学习</div>
  </a>
  <a class="card teacher" href="teacher.html">
    <div class="card-icon">👩‍🏫</div>
    <div class="card-title">老师入口</div>
    <div class="card-sub">管理课堂、查看成绩、编辑内容</div>
  </a>
</div>
<div class="footer">智学华文小达人 · 智能引领，玩转华文 · Designed by Wei Wen @ 2026</div>
</body>
</html>
